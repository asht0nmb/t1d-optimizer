ingestion:
  timezone: "America/Los_Angeles"
  chunk_days: 30
  overlap_days: 1

bg_targets:
  low: 70
  high: 180
  target: 110

# meal_detection / anomaly_detection / clustering blocks are consumed only by
# detection/legacy/*. Safe to remove when legacy is retired.
meal_detection:
  rise_threshold_per_5min: 8
  sustained_intervals: 3
  no_bolus_window_minutes: 30
  meal_windows:
    - [6, 10]
    - [11, 14]
    - [17, 23]

anomaly_detection:
  spike_threshold: 180
  drop_threshold: 70
  flatline_tolerance: 2
  # Number of consecutive 5-minute CGM readings whose rolling variance must
  # fall below flatline_tolerance before a flatline is flagged. K=12 == 1 hour
  # of flat signal; tuned for a low false-positive rate. Lower this to fire
  # sooner, raise it to require longer sustained flatness.
  flatline_consecutive_intervals: 12

site_change_detection:
  # Minutes after a BatteryShutdownAlarm during which a logged site_change is
  # presumed to be a firmware-forced cartridge/tubing refill, not a real site
  # rotation. See docs/operating_docs/DATA_NOTES.md §2.
  forced_window_minutes: 120
  # Minimum cartridge insulin_volume (units in the cartridge at fill time) that
  # overrides the forced-window heuristic: a fill this large inside the window
  # is treated as a genuine site change even after a pump-death restart.
  # Placeholder; dial in as more cartridge fills are observed.
  cartridge_real_fill_threshold: 220
  # Maximum gap between consecutive OcclusionAlarm activations that still
  # belong to the same site-failure cluster. See docs/operating_docs/DATA_NOTES.md §1.
  occlusion_cluster_window_minutes: 180
  # Minimum number of activated occlusions required to emit a cluster into
  # site_issues.parquet. A single isolated occlusion is not clinically
  # significant; 2+ in a short window usually means a failing infusion set.
  min_occlusions_for_cluster: 2

clustering:
  method: kmeans
  n_clusters: 5
  feature_mode: aggregated

notifications:
  telegram_bot_token: ""
  telegram_chat_id: ""
  confidence_threshold: 0.75
  cooldown_minutes: 30

meal_rise:
  window_minutes: 30            # trailing window (pre)
  fetch_buffer_minutes: 15      # extra Dexcom history beyond window_minutes
  expected_interval_minutes: 5
  fetch_readings_padding: 3     # extra polls beyond computed count
  min_samples: 4
  min_coverage: 0.7
  base_slope_mgdl_per_min: 1.8  # PLACEHOLDER, tuned in M2 against bolus data
  start_level_min: 70           # gate: ignore rises out of a low recovery
  start_level_max: 250          # gate: ignore rises already deep in hyper
  meal_windows:                 # local-time hour ranges; multiplier < 1 lowers the bar
    - {start_hour: 6,  end_hour: 10, multiplier: 0.7}
    - {start_hour: 11, end_hour: 14, multiplier: 0.7}
    - {start_hour: 17, end_hour: 21, multiplier: 0.7}
  off_hours_multiplier: 1.3
  refractory_minutes: 60
  max_reading_age_minutes: 15   # skip detection when the newest CGM reading is older than this (stale Dexcom Share data); ~3 missed 5-min cycles
  alert_template: "Fast glucose rise: {start} to {end} mg/dL (about {delta} up in {minutes} min). Flagging in case a meal went unbolused."

# M2 calibration: windows for labeling each meal-rise detection against bolus context.
meal_rise_calibration:
  pre_bolus_lookback_minutes: 30      # food bolus this far before the rise start → pre_bolused
  late_bolus_lookahead_minutes: 45    # food bolus up to this far after the rise start → late_bolused
  correction_lookahead_minutes: 180   # window to attribute an uncovered miss to a user/auto correction

