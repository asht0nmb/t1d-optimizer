ingestion:
  timezone: "America/Los_Angeles"
  chunk_days: 30
  overlap_days: 1

bg_targets:
  low: 70
  high: 180
  target: 110

# meal_detection / anomaly_detection / clustering blocks are consumed only by
# detection/legacy/*. Safe to remove when legacy is retired.
meal_detection:
  rise_threshold_per_5min: 8
  sustained_intervals: 3
  no_bolus_window_minutes: 30
  meal_windows:
    - [6, 10]
    - [11, 14]
    - [17, 23]

anomaly_detection:
  spike_threshold: 180
  drop_threshold: 70
  flatline_tolerance: 2
  # Number of consecutive 5-minute CGM readings whose rolling variance must
  # fall below flatline_tolerance before a flatline is flagged. K=12 == 1 hour
  # of flat signal; tuned for a low false-positive rate. Lower this to fire
  # sooner, raise it to require longer sustained flatness.
  flatline_consecutive_intervals: 12

site_change_detection:
  # Minutes after a BatteryShutdownAlarm during which a logged site_change is
  # presumed to be a firmware-forced cartridge/tubing refill, not a real site
  # rotation. See docs/operating_docs/DATA_NOTES.md §2.
  forced_window_minutes: 120
  # Minimum cartridge insulin_volume (units in the cartridge at fill time) that
  # overrides the forced-window heuristic: a fill this large inside the window
  # is treated as a genuine site change even after a pump-death restart.
  # Placeholder; dial in as more cartridge fills are observed.
  cartridge_real_fill_threshold: 220
  # Maximum gap between consecutive OcclusionAlarm activations that still
  # belong to the same site-failure cluster. See docs/operating_docs/DATA_NOTES.md §1.
  occlusion_cluster_window_minutes: 180
  # Minimum number of activated occlusions required to emit a cluster into
  # site_issues.parquet. A single isolated occlusion is not clinically
  # significant; 2+ in a short window usually means a failing infusion set.
  min_occlusions_for_cluster: 2

clustering:
  method: kmeans
  n_clusters: 5
  feature_mode: aggregated

notifications:
  telegram_bot_token: ""
  telegram_chat_id: ""
  confidence_threshold: 0.75
  cooldown_minutes: 30
