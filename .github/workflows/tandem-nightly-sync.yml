name: Tandem Nightly Sync

# Scheduled incremental Tandem → Supabase sync (enriched upsert).
# Manual smoke (auth-only, no DB) stays in test-tandem-sync.yml.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Sync Tandem data to Supabase
        env:
          TCONNECT_EMAIL: ${{ secrets.TCONNECT_EMAIL }}
          TCONNECT_PASSWORD: ${{ secrets.TCONNECT_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          CACHE_CREDENTIALS: "false"
          PYTHONUNBUFFERED: "1"
        run: uv run python scripts/sync_tandem_to_supabase.py
